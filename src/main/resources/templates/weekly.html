<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weekly Progress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center mb-4">Weekly Progress</h2>
    <canvas id="weeklyChart" height="150"></canvas>
    <div class="mt-3">
        <a href="/" class="btn btn-secondary">Back to Today</a>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const labels = [[${last7DaysLabels}]];
    const data = {
        labels: labels,
        datasets: [{
            label: "Daily Completion %",
            backgroundColor: "rgba(75, 192, 192, 0.5)",
            borderColor: "rgba(75, 192, 192, 1)",
            borderWidth: 1,
            data: [[${last7Days}]],
        }]
    };

    const config = {
        type: 'bar',
        data: data,
        options: {
            responsive: true,
            scales: { y: { beginAtZero: true, max: 100 } }
        }
    };

    new Chart(document.getElementById('weeklyChart'), config);
    /*]]>*/
</script>
</body>
</html>
