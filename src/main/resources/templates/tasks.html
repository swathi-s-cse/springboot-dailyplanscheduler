<!DOCTYPE html>

<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>Personal Discipline Log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        .text-strikethrough{
        text-decoration : line-through;
        color:green;
        }
    </style>
</head>

<body>

<div class="container">
<h1 class ="mt-5 text-center">Personal Discipline Log</h1>


    <form action="/" method="post" class="row mt-3 g-2">
        <div class="col-12 col-md-10">
            <input class="form-control form-control-lg"
                   type="text" name="title" placeholder="Add a new rule..." required>
        </div>

        <div class="col-12 col-md-2 d-grid">
            <button type="submit" class="btn btn-primary btn-lg">Add</button>
        </div>
    </form>



    <div class="mt-3 mb-3">
        <h5>Today's Progress: <span th:text="${todayScore} + '%'">0%</span></h5>
        <div class="progress">
            <div class="progress-bar" role="progressbar"
                 th:style="'width:' + ${todayScore} + '%;' +
               'background: linear-gradient(to right, ' +
               (${todayScore} < 50 ? '#F5A5A5, #FAD0C4' :
                (${todayScore} < 80 ? '#FFA500, #FFD580' : '#4CAF50, #A8E6CF')) + ');' +
               'color: black; font-weight:bold;'"
                 th:text="${todayScore} + '%'">
            </div>

        </div>

    </div>


    <div class="mb-4">
        <a href="/weekly" class="btn btn-info btn-sm">View Weekly Progress</a>
    </div>


    <div class="mt-4">
    <th:block th:each="task :${tasks}">
        <div class="card mb-2">
            <div class="card-body d-flex justify-content-between align-items-center">
            <span th:classappend="${task.completedToday} ? 'text-strikethrough'"
                  th:text="${task.title}">Task Title</span>


                <div>
                <a th:href="@{/{id}/toggle(id=${task.id})}" class="btn btn-outline-secondary btn-sm">Done</a>


                <a th:href="@{/{id}/delete(id=${task.id})}" class="btn btn-outline-danger btn-sm ml-2">Discard</a>
            </div>
        </div>
        </div>
    </th:block>
    </div>
</h1>
</div>
</body>

</html>
